<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    
    <link rel="stylesheet" href="styles.css">

    
</head>
<body>
    <h1>Rock Paper Scissors!</h1>
    <h2>First to 5 wins!</h2>
    <div class = "buttons">
        <button id = "ROCK" class = "btn" >Rock</button>
        <button id = "PAPER" class = "btn" >Paper</button>
        <button id = "SCISSORS" class = "btn" >Scissors</button>
    </div>
    <div class="text-line">
        <p class="text" id="player-score">Player Score:</p>
        <p class="text" id="comp-score">Computer Score:</p>
    </div>
    <div>
        <p class = "text output">Ready?</p>
    </div>
    <script type="text/javascript" src="scripts.js"></script>
</body>
</html>
